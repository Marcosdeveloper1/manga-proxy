syntax = "proto3";

message Title {
  uint32 titleId = 1;
  string name = 2;
  string author = 3;
  string portraitImageUrl = 4;
  string landscapeImageUrl = 5;
  uint32 viewCount = 6;
  uint32 language = 7;
}

message Chapter {
  uint32 titleId = 1;
  uint32 chapterId = 2;
  string name = 3;
  string subTitle = 4;
  string thumbnailUrl = 5;
  string startTimeStamp = 6;
  string endTimeStamp = 7;
  bool alreadyViewed = 8;
  bool isVerticalOnly = 9;
}

message MangaPage {
  string imageUrl = 1;
  uint32 width = 2;
  uint32 height = 3;
  string encryptionKey = 4;
}

message Page {
  oneof page {
    MangaPage mangaPage = 1;
  }
}

message MangaViewer {
  repeated Page pages = 1;
  Title titleName = 4;
  string chapterName = 6;
}

message TitleDetailView {
  Title title = 1;
  string overview = 2;
  string backgroundImageUrl = 3;
  string nextTimeStamp = 4;
  uint32 updateTimingWord = 5;
  repeated Chapter firstChapterList = 6;
  repeated Chapter lastChapterList = 7;
  repeated Chapter bannerList = 9;
  repeated Chapter recommendedTitleList = 10;
}

message AllTitlesView {
  repeated Title titles = 1;
}

message TitleRankingView {
  repeated Title titles = 1;
}

message SuccessResult {
  oneof view {
    AllTitlesView allTitlesView = 4;
    TitleDetailView titleDetailView = 8;
    MangaViewer mangaViewer = 10;
    TitleRankingView titleRankingView = 23;
  }
}

message Response {
  oneof result {
    SuccessResult success = 1;
  }
}
